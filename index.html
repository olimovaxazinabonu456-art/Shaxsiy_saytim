<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safarova Aziza | Professional Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --dark-surface: #0a0a0c;
            --text-main: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--dark-surface);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
        }

        /* Orqa fondagi dinamik effekt */
        .bg-mesh {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(58, 123, 213, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.15) 0px, transparent 50%);
            z-index: -1;
        }

        /* Asosiy Karta */
        .glass-card {
            position: relative;
            width: 450px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8);
            transform-style: preserve-3d;
        }

        /* Profil rasmi - Siz yuborgan rasm uchun maxsus */
        .profile-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            transform: translateZ(60px);
        }

        .main-img {
            width: 100%;
            height: 100%;
            border-radius: 35%; /* Squircle shakli */
            object-fit: cover;
            border: 2px solid rgba(0, 210, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .online-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 5px 12px;
            background: #22c55e;
            color: white;
            font-size: 10px;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 0 15px #22c55e;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .typewriter {
            font-size: 14px;
            color: var(--primary-glow);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            display: block;
        }

        /* Info bo'limi */
        .bio {
            font-size: 15px;
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        /* Skill list */
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 35px;
        }

        .skill-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 12px;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }.skill-item:hover {
            background: var(--primary-glow);
            color: #000;
            font-weight: bold;
        }

        /* Buttons */
        .btn-wrap {
            display: flex;
            gap: 15px;
        }

        .btn-cyber {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--primary-glow);
            color: #000;
        }

        .btn-secondary {
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-cyber:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
        }

        /* Ijtimoiy tarmoqlar */
        .social-row {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-row a {
            color: #94a3b8;
            font-size: 20px;
            transition: 0.3s;
        }

        .social-row a:hover {
            color: var(--primary-glow);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <div class="glass-card" data-tilt data-tilt-max="10" data-tilt-glare data-tilt-max-glare="0.1">
        <div class="profile-container">
            <img src="5305311395966554518.jpg" class="main-img" alt="Safarova Aziza">
            <div class="online-badge">Active</div>
        </div>

        <span class="typewriter">IT Specialist & Researcher</span>
        <h1>Safarova Aziza</h1>
        
        <p class="bio">
            Qarshi davlat universiteti talabasi. Matematika va zamonaviy IT texnologiyalari uyg'unligida innovatsion loyihalar yaratuvchisi.
        </p>

        <div class="skill-grid">
            <div class="skill-item">Python</div>
            <div class="skill-item">AI/ML</div>
            <div class="skill-item">Full-Stack</div>
            <div class="skill-item">Math</div>
            <div class="skill-item">GitHub</div>
            <div class="skill-item">Cloud</div>
        </div>

        <div class="btn-wrap">
            <a href="https://t.me/your_username" class="btn-cyber btn-primary">Xabar yuborish</a>
            <a href="#" class="btn-cyber btn-secondary">Portfolio</a>
        </div>

        <div class="social-row">
            <a href="#"><i class="fab fa-telegram"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
        </div>
    </div>

    <script>
        // Tilt effekti sozlamalari
        VanillaTilt.init(document.querySelector(".glass-card"), {
            max: 10,
            speed: 400,
            glare: true,
            "max-glare": 0.1,
        });
    </script>
</body>
</html>
