<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
            width: 300px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            margin-bottom: 15px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        .profile-img:hover {
            transform: scale(1.05);
        }
        h1 {
            font-size: 22px;
            margin: 10px 0;
        }
        p {
            font-size: 14px;
            opacity: 0.9;
            line-height: 1.5;
        }
        button {
            background: white;
            color: #764ba2;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin: 15px 0;
            transition: 0.3s;
        }
        button:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
        }
        .social-links {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .social-links a {
            color: white;
            text-decoration: none;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 8px 15px;
            border-radius: 15px;
            transition: 0.3s;
        }
        .social-links a:hover {
            background: rgba(255,255,255,0.2);
            border-color: white;
        }
    </style>
</head>
<body>

    <div class="card" id="myCard">
        <img src="https://via.placeholder.com/120" class="profile-img" alt="Profil">
        
        <h1>Olimova Xazinabonu</h1>
        <p>Qarshi davlat universiteti 2-bosqich talabasi. Kelajakda kuchli dasturchi bo'lish niyatidaman.</p>
        
        <button onclick="changeColor()">Rangni o'zgartirish</button>

        <div class="social-links">
            <a href="https://t.me/Sizning_Usernamiz" target="_blank">Telegram</a>
            <a href="https://instagram.com/Sizning_Usernamiz" target="_blank">Instagram</a>
        </div>
    </div>

    <script>
        function changeColor() {
            const card = document.getElementById('myCard');
            // Tasodifiy ranglar generatsiyasi
            const colors = [
                'linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%)',
                'linear-gradient(135deg, #ee9ca7 0%, #ffdde1 100%)',
                'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)',
                'linear-gradient(135deg, #fc466b 0%, #3f5efb 100%)'
            ];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            card.style.background = randomColor;
        }
    </script>
    
</body>
</html>
