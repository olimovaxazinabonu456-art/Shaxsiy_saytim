<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olimova Xazinabonu| Senior Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <style>
        :root {
            --accent: #00f2fe;
            --secondary: #4facfe;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            cursor: none; /* Maxsus kursor uchun */
        }

        body {
            background: var(--dark-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Maxsus Kursor */
        #cursor {
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s;
            mix-blend-mode: difference;
        }

        /* Orqa fondagi animatsiya */
        .bg-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        /* Asosiy Karta */
        .portfolio-card {
            width: 420px;
            padding: 50px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 40px 60px rgba(0,0,0,0.5);
            transform-style: preserve-3d;
        }

        /* Profil ramkasi (Neon effekt) */
        .img-box {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            position: relative;
            transform: translateZ(50px);
        }

        .img-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .img-box::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent), var(--secondary));
            z-index: -1;
            filter: blur(15px);
            opacity: 0.6;
        }

        h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            transform: translateZ(40px);
        }

        .dev-title {
            color: var(--accent);
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 20px;
            display: block;
        }

        /* Bilimlar darajasi (Skills) */
        .skills-container {
            margin: 25px 0;
            text-align: left;
        }

        .skill-tag {
            display: inline-block;
            background: rgba(255,255,255,0.05);
            color: #ccc;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            margin: 3px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .skill-tag:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-3px);
        }

        /* Tugmalar */
        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }.btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: 0.4s;
        }

        .btn-main {
            background: #fff;
            color: #000;
        }

        .btn-outline {
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,242,254,0.2);
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="bg-animate"></div>

    <div class="portfolio-card" data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">
        <div class="img-box">
            <img src="https://via.placeholder.com/150" alt="Olimova Xazinabonu">
        </div>

        <span class="dev-title">Mathematics & AI Specialist</span>
        <h1>Olimova Xazinabonu</h1>
        <p style="color: #888; font-size: 13px; margin-top: 10px;">
            Qarshi davlat universiteti, ATT yo'nalishi talabasi. Web-development va AI tadqiqotchisi.
        </p>

        <div class="skills-container">
            <div class="skill-tag">Python</div>
            <div class="skill-tag">JavaScript</div>
            <div class="skill-tag">Discrete Math</div>
            <div class="skill-tag">TensorFlow</div>
            <div class="skill-tag">HTML/CSS</div>
        </div>

        <div class="actions">
            <a href="https://t.me/your_username" class="btn btn-main">Bog'lanish</a>
            <a href="https://github.com/your_username" class="btn btn-outline">Loyihalar</a>
        </div>
    </div>

    <script>
        // Maxsus kursor harakati
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Tilt effekti init
        VanillaTilt.init(document.querySelector(".portfolio-card"), {
            max: 15,
            speed: 400,
            glare: true,
            "max-glare": 0.2,
        });
    </script>
</body>
</html>
